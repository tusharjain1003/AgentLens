services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: weblens
      POSTGRES_USER: weblens
      POSTGRES_PASSWORD: weblens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weblens -d weblens"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      target: runtime
    command: uvicorn app:app --host 0.0.0.0 --port 8765 --reload
    environment:
      DATABASE_URL: postgresql://weblens:weblens@db:5432/weblens
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      JINA_API_KEY: ${JINA_API_KEY:-}
      ENVIRONMENT: development
      PORT: 8765
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SEMANTIC_CACHE_ENABLED: ${SEMANTIC_CACHE_ENABLED:-false}
      PUBLIC_MODE: ${PUBLIC_MODE:-false}
    ports:
      - "8765:8765"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_BACKEND_URL: http://backend:8765
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:
